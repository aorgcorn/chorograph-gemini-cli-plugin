name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: macos-14
    permissions:
      contents: write
    outputs:
      version: ${{ steps.meta.outputs.version }}
      wasm_url: ${{ steps.cdn_hash.outputs.wasm_url }}
      sha256: ${{ steps.cdn_hash.outputs.sha256 }}

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install Rust wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Build WASM
        run: |
          cargo build --release --target wasm32-unknown-unknown
          cp target/wasm32-unknown-unknown/release/chorograph_gemini_cli_plugin_rust.wasm \
             chorograph_gemini_cli_plugin_rust.wasm

      - name: Build Swift bundle
        run: swift build -c release

      - name: Package bundle
        run: |
          set -euo pipefail
          PLUGIN_NAME="ChorographGeminiCLIPlugin"
          DYLIB=".build/release/lib${PLUGIN_NAME}.dylib"
          BUNDLE_DIR="${PLUGIN_NAME}.bundle"
          ZIP_NAME="${BUNDLE_DIR}.zip"

          rm -rf "${BUNDLE_DIR}"
          mkdir -p "${BUNDLE_DIR}/Contents/MacOS"
          cp "${DYLIB}" "${BUNDLE_DIR}/Contents/MacOS/${PLUGIN_NAME}"

          # Fix the dylib install name. SPM sets it to @rpath/lib<Name>.dylib,
          # but the binary lives at Contents/MacOS/<Name> (no lib prefix, no
          # .dylib extension). Rewrite the install name to @rpath/<Name> so
          # the self-referential rpath dependency resolves correctly at dlopen
          # time regardless of where the bundle is placed on the user's system.
          install_name_tool -id \
            "@rpath/${PLUGIN_NAME}" \
            "${BUNDLE_DIR}/Contents/MacOS/${PLUGIN_NAME}"

          cat > "${BUNDLE_DIR}/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>ChorographGeminiCLIPlugin</string>
              <key>CFBundleIdentifier</key>
              <string>com.aorgcorn.chorograph.plugin.gemini-cli</string>
              <key>CFBundlePackageType</key>
              <string>BNDL</string>
          </dict>
          </plist>
          PLIST

          zip -r "${ZIP_NAME}" "${BUNDLE_DIR}"
          rm -rf "${BUNDLE_DIR}"

      - name: Extract version from tag
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            chorograph_gemini_cli_plugin_rust.wasm
            ChorographGeminiCLIPlugin.bundle.zip
          body: "Release ${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute canonical CDN SHA-256
        id: cdn_hash
        run: |
          set -euo pipefail
          VERSION="${{ steps.meta.outputs.version }}"
          REPO="aorgcorn/chorograph-gemini-cli-plugin"
          WASM_ASSET="chorograph_gemini_cli_plugin_rust.wasm"
          WASM_URL="https://github.com/${REPO}/releases/download/v${VERSION}/${WASM_ASSET}"

          # GitHub may serve a transitional copy on the first request.
          # Re-fetch until two consecutive downloads produce the same hash.
          VERIFIED=$(mktemp /tmp/gemini-verify-XXXXXX.wasm)
          PREV_SHA=""
          SHA=""
          for i in 1 2 3 4 5; do
            sleep 3
            curl -L -s -o "${VERIFIED}" "${WASM_URL}"
            SHA=$(shasum -a 256 "${VERIFIED}" | awk '{print $1}')
            echo "Attempt ${i}: ${SHA}"
            if [ "${SHA}" = "${PREV_SHA}" ]; then
              echo "Hash stabilised."
              break
            fi
            PREV_SHA="${SHA}"
          done
          rm -f "${VERIFIED}"

          echo "wasm_url=${WASM_URL}" >> "$GITHUB_OUTPUT"
          echo "sha256=${SHA}" >> "$GITHUB_OUTPUT"

          gh release edit "v${VERSION}" \
            --repo "${REPO}" \
            --notes "## SHA-256
          \`${SHA}\`"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-registry:
    needs: build-and-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout plugin-registry
        uses: actions/checkout@v4
        with:
          repository: aorgcorn/plugin-registry
          token: ${{ secrets.REGISTRY_PAT }}

      - name: Update registry entry
        run: |
          set -euo pipefail
          VERSION="${{ needs.build-and-release.outputs.version }}"
          WASM_URL="${{ needs.build-and-release.outputs.wasm_url }}"
          SHA256="${{ needs.build-and-release.outputs.sha256 }}"
          PLUGIN_ID="com.chorograph.plugin.gemini-cli"

          jq --arg id "$PLUGIN_ID" \
             --arg version "$VERSION" \
             --arg url "$WASM_URL" \
             --arg sha "$SHA256" \
             'map(if .id == $id then .version = $version | .wasm_url = $url | .sha256 = $sha else . end)' \
             registry.json > registry.tmp.json
          mv registry.tmp.json registry.json

      - name: Commit and push
        run: |
          VERSION="${{ needs.build-and-release.outputs.version }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add registry.json
          git commit -m "chore: update gemini-cli plugin to v${VERSION}"
          git push
